// File overview: Defines protobuf messages for db.

syntax = "proto3";


package pbdb;

//option optimize_for = SPEED;

enum ENUM_DB
{
	ENUM_DB_ACCOUNT			= 0;		// Accountdata
	ENUM_DB_ROLE			= 1;		// Playerdata
	ENUM_DB_BRIEF			= 2;		// Playersummarydata
	ENUM_DB_BAG				= 3;		// Bagdata
	ENUM_DB_KEYVALUE		= 4;		// Sharedkey/valuedata
	ENUM_DB_MAIL			= 5;		// Maildata
	ENUM_DB_NOTICE			= 6;		// Noticedata
	ENUM_DB_RANKLIST		= 7;		// Rankdata
	ENUM_DB_ACTIVITY		= 8;		// Activitydata
	ENUM_DB_ACTIVITYTIMES	= 9;		// Activitystartclosetime
	ENUM_DB_TASK			= 10;		// Taskdata
	ENUM_DB_ROLEKEYVALUE	= 11;		// Playerpersonalkey/valuedata
	ENUM_DB_FAMILY			= 12;		// Guild
	ENUM_DB_FAMILYER		= 13;		// Guild
	ENUM_DB_FRIENDS			= 14;		// Friends
	ENUM_DB_TESTLUA			= 15;		// Testluascript handle
	ENUM_DB_COUNT			= 16;

	// # Cross-server
	ENUM_DBCROSS_TEST		= 1001;		// Testcross-server

	ENUM_DB_FAIL			= -1;		// Translated comment.
	ENUM_DB_ALL				= -2;		// All
};

// ENUM_DB_ACCOUNT, // accountdata
message db_account
{
	optional int64	mid				= 1;				// Id
	optional int64	mroleid			= 2;				// Roleid
	optional string maccount		= 3;				// Account
	optional string mpassworld		= 4;				// Translated comment.
	optional int32	marea			= 5;				// Areaid
}

message brief_base
{
	optional string mname			= 1;					// Translated comment.
	optional int32 mlv				= 2;					// Level
	optional int32 mmoneygold		= 3;					// Translated comment.
	optional int32 mmoneysilver		= 4;					// Translated comment.
	optional int32 mvip				= 5;					// Viplevel
	optional int32 mnotalkutc		= 6;					// Translated comment.
	optional int32 mcreateutc		= 7;					// Time
}

message brief_activityvalues
{
	map<int32,int32> mactivity_rolelv = 1;		// Activityduringplayerlevelchange key:activityid value:level
	map<int32,int32> mactivity_rolegold = 2;	// Activityduringplayerget key:activityid value:level
}

// ENUM_DB_BRIEF, // playersummarydata
message db_brief
{
	optional int64 mid				= 1;					// role id
	brief_base mbase				= 2;					// Data(actor_role write)
	optional brief_activityvalues mactivityvalues	= 3;	// Activity (actor_activity_manage write)
}

// ENUM_DB_ROLE, // playerdata
message db_role
{
	optional int64 mid					= 1;				// role id
	// Info
	message recharge
	{
		optional int32 mrechargeid		= 1;	// Id
		optional int32 mutc				= 2;	// Time
	}
	repeated recharge mrecharge			= 2;
}

// ENUM_DB_BAG, // bagdata
message item
{
	optional int32 mid			= 1;
	optional int32 mtid		= 2; // tab id
	optional int32 mcount		= 3;
	// ## Card equipment
	optional int32 mlv			= 4;	// Level
	optional int32 mstar		= 5;	// Translated comment.
}


message db_bag
{
	optional int64 mid					= 1;	// roleid
	map<int32, item> mitems			= 2;	// key item id
	optional int32 mmaxid				= 3;
}

// ENUM_DB_KEYVALUE, // sharedkey/valuedata
message db_keyvalue
{
	enum ekv
	{
		none			= 0;
		account_ban		= 1;	// List
		open_server		= 2;	// Server opentime
	}
	optional int64 mid					= 1;				// ekeyvalue
	optional string mvalue				= 2;				// value
}

// ENUM_DB_ROLEKEYVALUE, // playerpersonalkey/valuedata
message db_rolekeyvalue
{
	optional int64 mid					= 1;
	map<string,string> mdata			= 2;				// key/val
}

// ENUM_DB_MAIL, // maildata
message mailitem
{
	optional int32 mitemtid	= 1;
	optional int32 mcount		= 2;
}
message mail
{
	optional int32 mid				= 1;
	optional int32 mcreateutc		= 2;	// Createtime
	// // [Mailcontent] 1.mailtableid parameters
	optional int32 mtid			= 3;	// Mailtableid
	optional string mprams			= 4;	// Parameters # pram1#pram2..
	// // [Mailcontent] 2.string
	optional string mcontent		= 5;	// Mailcontent
	repeated mailitem  mitems		= 6;	// Mailattachment
	optional bool mread			= 7;	// Whether
	optional bool mdraw			= 8;	// Whetherclaimattachment
}

message db_mail
{
	optional int64 mid				= 1;
	map<int32, mail> mmail			= 2; // key mail id
}

// ENUM_DB_NOTICE, // noticedata
message db_notice
{
	optional int64 mid			= 1;				// Noticeid
	optional string mnotice	= 2;				// Content
	optional int32 mstarttime	= 3;				// Time
	optional int32 mfinishtime	= 4;				// Endtime
};

enum eranklist
{
	eranklist_null = 0;
	// Base ranklistintype
	lv			= 1;			// Levelrank( )
	gold		= 2;
	count		= 3;
	// Activity
	activity_lv		= 1000000;		// Activityduringplayerlevelchange
	activity_gold	= 2000000;		// Activityduringplayer
}

message rankitem
{
	optional int64 mvalue	= 1;
	optional int32 mtime	= 2;
}

// ENUM_DB_RANKLIST, // rankdata
message db_ranklist
{
	optional int64 mid			= 1;				// roleid
	map<int32,rankitem> mitems	= 2;				// Key:rank listtypeeranklist
}

message db_activitytimes
{
	optional int64 mid			= 1; // Tab_actiivity tableid
	optional int32 mbeg		= 2; // Activitystarttime
	optional int32 mduration	= 3; // Activitydurationtime
	optional bool mstart		= 4; // Whether start(executestart )
}

message activity_task
{
	map<int32,bool> mopen	= 1;	// key:day
	map<int32,bool> mclose = 2;	// key:day
}

message activity_drawcompliance
{
	optional int32 mcount		= 1; // Translated comment.
	map<int32,bool> mreward	= 2; // Claimwhichreward
}

message db_activity
{
	optional int64 mid										= 1; // Tab_actiivity tableid
	map<int64,activity_task> mtask							= 2; // key:roleid
	// tab_activity.mtype == EActivityDrawCompliance
	map<int64,activity_drawcompliance> mdrawcompliance		= 3;
}

message db_task
{
	optional int64 mid				= 1; // roleid
	message data_schedule
	{
		optional int32 mtype			= 1;	// csvtable.ETask
		optional int32 mvalue			= 2;	// Current
		optional int32 msumint			= 3;	// Translated comment.
	}
	message data
	{
		optional int32 mtaskid				= 1; // Taskid
		optional int32 mreceiveutc			= 2; // Tasktime
		optional int32 mfinshutc			= 3; // Completetasktime
		repeated data_schedule mschedules  = 4; // Task
		optional bool mreceive				= 5; // Taskrewardwhether claim
	}
	message complete
	{
		repeated data mhistory			= 1;	// Completetask
	}
	map<int32,data> mrundatas			= 2; // Taskdata
	map<int32,complete> mcompleteddatas	= 3; // Complete taskdata
}

message db_familyer
{
	optional int64 mid					= 1;	// Guild id
	optional int32 mjoinutc			= 2;	// Joinguild time
	optional int32 mlastsignutc		= 3;	// On sign intime
	optional int32 mlastleaveutc		= 4;	// On leaveguildtime
	// Position
	enum eposition
	{
		none		= 0;		// Joinguild
		leader		= 1;		// Guild
		counsellor	= 2;		// Translated comment.
		ordinary	= 3;		// Translated comment.
	}
	optional eposition mposition		= 5; // Position
}

message db_family
{
	optional int64		mid			= 1; // Guildid
	optional int32		mcreateutc		= 2; // Guildcreatetime
	optional string		mname			= 3; // Guildname
	optional int64		mleader		= 4; // Guild
	optional int32		mlv			= 5; // Guildlevel
	optional int32		mexp			= 6; // Guild
	repeated int64		mmember		= 7; // Translated comment.
	repeated int64		mapplylist		= 8; // Applylist
}

message db_friends
{
	optional int64		mid			= 1;	// Playerroleid
	repeated int64		mfriends		= 2;	// Friendslist
	repeated int64		mapplyfriends	= 3;	// Friendsrequestlist
}

// # Cross-server
// ENUM_DBCROSS_TEST = 1001; // testcross-server
message dbcross_test
{
	optional string		mname			= 1;	// Name
	repeated int64		mvalue			= 2;	// Translated comment.
}

// ENUM_DB_TESTLUA = 15; // testluascript handle
message db_testlua
{
	optional int64		mid				= 1;
	repeated int64		mvalue			= 2;
	message luadata
	{
		optional string		mkey			= 1;
		optional string		mval			= 2;
	}
	map<int32,luadata>		mdatas			= 3; 
}

///////////////////////////////////////////////////////////////
// // ################ [Aoimaprelated Start] ################ ////
//// ##################################################### ////

enum EUNIT
{
	EUNIT_FAIL		= 0;		// Type
	EUNIT_ROLE		= 1;		// Player
	EUNIT_MONSTER	= 2;		// Translated comment.
	EUNIT_REGION	= 3;		// Translated comment.
};

message VECTOR2
{
	optional int32 mx = 1;
	optional int32 my = 2;
};

message VECTOR3
{
	optional int32 mx = 1;
	optional int32 my = 2;
	optional int32 mz = 3;
};

message POSITION
{
	optional int32 mmapid		= 1;			// Mapid
	optional VECTOR2 mposition	= 2;
	optional int32 mangle		= 3;			// Direction [0-360]
	optional int32 mspeed		= 4;			// Translated comment.
};

message ATTRIBUTE
{
	 optional int32 mtype				= 1;	// EnumAttribute
	 optional int64 mvalue				= 2;	// Attribute
};

message UNIT_MODULE
{
	optional int32 mmtype			= 1;		// EnumModule
	repeated ATTRIBUTE mmodules		= 2;
};

message UNIT
{
	optional EUNIT mtype				= 1;
	optional int64 mid					= 2;
	optional POSITION mposition			= 3;
	repeated UNIT_MODULE mmodules		= 4;
};

//// ###################################################### ///
// // ################ [Aoimaprelated Finish] ################ ///
