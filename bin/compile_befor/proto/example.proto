// File overview: Defines protobuf messages for example.

syntax = "proto3";


import "db.proto";
import "net.proto";

package pbexample;
//namespace
// Support SPEED(fast, use the most memory) CODE_SIZE LITE_RUNTIME(most efficient,, supportreflection)
// Option optimize_for = LITE_RUNTIME; // supportreflection,
option optimize_for = SPEED;

enum ECROSS
{
	ECROSS_NULL				= 0;
	ECROSS_ORDINARY			= 1;			// Forwarding
	ECROSS_CROSS_ORDINARY	= 2;			// Cross-serverforwarding
}

enum EPLAY_TYPE
{
	EPLAY_NULL = 0;
	EPLAY_GUESS_NUMBER = 1;
}

// Joingameplay
message PROBUFF_EXAMPLE_PLAY_JOIN//C2G2 [actor_example_match]
{
	optional ECROSS mcross			= 1;
	optional EPLAY_TYPE mtype		= 2;
};

message PROBUFF_EXAMPLE_PLAY_JOIN_RESPONSE//G2C [actor_robot]
{
	optional int32 mroomid					= 2; // Room
};

message PLAYER
{
	optional pbdb.db_brief mplayers		= 1; // Player info
	optional bool misconfirm				= 2; // Whetherconfirm
};

// Synchronize info
message PROBUFF_EXAMPLE_PLAY_MATCHING//G2C [actor_robot]
{
	optional int32 mroomid					= 1; // Room
	optional int32 mtotalnumber			= 2; // Need to
	optional int64 mroomcreate				= 3; // Roomcreatetime
	optional int64 mroomready				= 4; // Roomreadytime
	repeated PLAYER mplayers				= 5; // To player
};


enum PLAY_MATCHING_EERROR_CODE
{
	EERROR_CODE_SUCCESS = 0;
	EERROR_CODE_TIMEOUT = 1;			// Translated comment.
	EERROR_CODE_CANCEL  = 2;			// Playercancel
	EERROR_CODE_CURRENT_CANCEL  = 3;	// Currentdo not allowcancel
	EERROR_CODE_NOTFINDROOM = 4;		// Tospecifiedroom
	EERROR_CODE_ROOM_DESTORY = 5;		// Room
	EERROR_CODE_FINISH = 6;				// Complete room
	EERROR_CODE_NOTMATCH = 7;			// And cannotjoin
	EERROR_CODE_CREATEROOM_FAIL = 8;	// Createroom
	EERROR_CODE_CREATEGAME_FAIL = 9;	// Create
	EERROR_CODE_NOTFIND = 10;			// Tospecified
}

// Match result.
message PROBUFF_EXAMPLE_PLAY_MATCHING_RESULT//G2C [actor_robot]
{
	optional PLAY_MATCHING_EERROR_CODE merrorcode		= 1;
	optional int32 mroomid								= 2; // Room
};

// Playerconfirmjoin
message PROBUFF_EXAMPLE_PLAY_PLAYER_CONFIRM//C2G2 [actor_example_match]
{
	optional bool misconfirm				= 1; // Whetherneed toconfirmjoin
	optional int32 mroomid					= 2; // Room
};

// Cancel
message PROBUFF_EXAMPLE_PLAY_CANCEL//C2G2 [actor_example_match]
{
	optional EPLAY_TYPE mtype				= 1;
	optional int32 mroomid					= 2; // Room
};

// Createinstance gamesuccessful
message PROBUFF_EXAMPLE_PLAY_CREATE//G2C [actor_robot]
{
	optional EPLAY_TYPE mtype				= 1;
	optional int64 mexampleactorid			= 2;
	enum estat
	{
		estat_success = 0;
		estat_fail = 1;
	}
	optional estat mstat					= 3;
}

// Instance game
message PROBUFF_EXAMPLE_PLAY_ENTER_EXAMPLE//C2G2 [actor_example_manage]
{
	optional ECROSS mcross					= 1;
	optional EPLAY_TYPE mtype				= 2;
	optional int64 mexampleactorid			= 3;
}

message PROBUFF_EXAMPLE_PLAY_ENTER_EXAMPLE_RESPONSE//G2C [actor_robot]
{
	optional ECROSS mcross					= 1;
	optional EPLAY_TYPE mtype				= 2;
	optional int64 mexampleactorid			= 3;
	repeated int64 mplayers				= 4; // Player
}

// Translated comment.


// Match result.
message PROBUFF_EXAMPLE_GUESS_NUMBER_INFO//G2C [actor_robot]
{
	optional int32 mmaxnumber					= 1; // Translated comment.
	optional int32 mminnumber					= 2; // Translated comment.
	optional int64 mwhoguess					= 3; // Translated comment.
};

message PROBUFF_EXAMPLE_GUESS_NUMBER//C2G2 [actor_example_guess_number]
{
	optional int32 mguessnumber				= 1; // Translated comment.
};

enum E_GUESS_NUMBER_ERROR
{
	E_GUESS_NUMBER_ERROR_NULL = 0;
	E_GUESS_NUMBER_ERROR_VALUE = 1;	// Translated comment.
	E_GUESS_NUMBER_ERROR_NOT_GUESS = 2; // Current this playercannot
}

message PROBUFF_EXAMPLE_GUESS_NUMBER_ERROR//G2C [actor_robot]
{
	optional E_GUESS_NUMBER_ERROR mstat		= 1; // Translated comment.
};

message PROBUFF_EXAMPLE_GUESS_NUMBER_BOMB//G2C [actor_robot]
{
	optional int32 mbombvalue					= 1; // Translated comment.
	optional int64 mroleid						= 2; // Player
};

// Translated comment.