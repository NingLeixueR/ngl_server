// File overview: Defines protobuf messages for net.

syntax = "proto3";


import "db.proto";

package pbnet;
//namespace
// Support SPEED(fast, use the most memory) CODE_SIZE LITE_RUNTIME(most efficient,, supportreflection)
// Option optimize_for = LITE_RUNTIME; // supportreflection,
option optimize_for = SPEED;

// G2C					game->client
// C2G					client->actor_role
// C2G2 secondaryforwardingclient->actor_role->ACTOR_XXX
// XXX specialactorhandle

// [Response] serverused toresponse, used tocmdprotocol, used toreturn string
message PROBUFF_NET_MSG_RESPONSE//G2C [actor_robot]
{
	optional string mmsg		= 1;
};

// [Request]heartbeatprotocol
message PROBUFF_NET_HEARTBEAT
{
};

// [Request]
message PROBUFF_NET_RECHARGE//C2G [actor_role]
{
	optional int32 mrechargeid			= 1;
};

// [Response]
message PROBUFF_NET_RECHARGE_RESPONSE//G2C [actor_robot]
{
	optional int32 mrechargeid			= 1;
	enum Estat
	{
		Estat_Success		= 0;	// Successful
		Estat_NotRechargeId	= 1;	// Tospecified id
		Estat_MaxCount		= 2;	// Translated comment.
	}
	optional Estat mstat				= 2;
	optional string morderid			= 3;
};

// [Response]notifyclient
message PROBUFF_NET_DELIVER_GOODS_RECHARGE//G2C [actor_robot]
{
	optional int32 mrechargeid			= 1;
	optional string morderid			= 2;
	optional int32 mgold				= 3;
	map<int32,int32> mitems			= 4;
};

// [Send]error code
message PROBUFF_NET_ERROR//G2C [actor_robot]
{
	optional string merrmessage	= 2; // Translated comment.
};

// [Request]servertime
message PROBUFF_NET_GET_TIME//C2G [actor_role]
{
};

// [Response]servertime
message PROBUFF_NET_GET_TIME_RESPONSE//G2C [actor_robot]
{
	optional int32 mutc			= 1; // Error code
};

// [Request]getnoticelist
message PROBUFF_NET_NOTICE//C2G2 [actor_notice]
{
};

// [Response]getnoticelist
message PROBUFF_NET_NOTICE_RESPONSE//G2C [actor_robot]
{
	repeated pbdb.db_notice mnotices		= 1;
};

// [Request]loginaccount
message PROBUFF_NET_ACOUNT_LOGIN//XXX [actor_login]
{
	optional int32 marea			= 1;	// Areaid
	optional string maccount		= 2;	// Translated comment.
	optional string mpassword		= 3;	// Translated comment.
};

// [Response]loginaccount
message PROBUFF_NET_ACOUNT_LOGIN_RESPONSE//XXX [actor_manage_robot]
{
	optional int32 marea			= 1;				// Areaid
	optional int64 mroleid			= 2;				// Playerid(ifroleid == 0 player createaccount)
	optional string msession		= 3;				// session
	optional string maccount		= 4;				// Translated comment.
	optional int32 mgatewayid		= 5;				// Gatewayid
	optional int32 mgameid			= 6;				// Serverid
};

// [Request]playerlogin
message PROBUFF_NET_ROLE_LOGIN//XXX [actor_gateway,actor_manage_role]
{
	optional int64 mroleid			= 1;	// Playerid
	optional string msession		= 2;	// session
	optional int32 marea			= 3;	// Areaid
	optional int32 mgatewayid		= 5;	// gatewayid
	optional int32 mgameid			= 6;	// gameid
};

// Login role create
message PROBUFF_NET_ROLE_NOT_CREATE//G2C [actor_robot]
{
	optional int64 mroleid			= 1;	// Playerid
};

message PROBUFF_NET_ROLE_CREATE//XXX [actor_manage_role]
{
	optional string mname			= 1;	// Translated comment.
};

message PROBUFF_NET_ROLE_CREATE_RESPONSE//G2C [actor_robot]
{
	enum estat
	{
		e_stat_success = 0;
		e_stat_fail = 1;
	};
	optional estat mstat			= 1;	// State
	optional string mname			= 2;	// Translated comment.
};

// [Request]getroleinfo
message PROBUFF_NET_ROLE_SYNC//C2G [actor_role]
{
};

// [Response]getroleinfo
message PROBUFF_NET_ROLE_SYNC_RESPONSE//G2C [actor_robot]
{
	optional pbdb.db_role mrole	= 1;
	optional pbdb.db_brief mbrief	= 2;
	optional pbdb.db_bag mbag		= 3;
	optional pbdb.db_task mtask	= 4;
};

// [Request]getbaginfo
message PROBUFF_NET_BAG_SYNC//C2G [actor_role]
{
};

// [Response]getbaginfo
message PROBUFF_NET_BAG_SYNC_RESPONSE//G2C [actor_robot]
{
	optional pbdb.db_bag mbag			= 1;
};

// [Response] baginfo
message PROBUFF_NET_BAG_UPDATE//G2C [actor_robot]
{
	message delitem
	{
		optional int32 mid				= 1; 
		optional int32 mcount			= 2; 
	};
	message additem
	{
		optional int32 mid				= 1; 
		optional int32 mcount			= 2; 
	};
	repeated delitem mdelitems					= 1;// Delete( item)
	repeated int32 mdelnostackitems			= 2;// Delete( item)
	repeated additem madditems					= 3;// ( Item)
	repeated int32 maddnostackitems			= 4;// ( Item)
	// Repeated pbdb.item mchangeitems = 5;// item
};

// [Request]cmdprotocol
message PROBUFF_NET_CMD//C2G [actor_role]
{
	optional string mcmd						= 1;
};

// [Request]chat
enum ENUM_LOGIC_CHAT
{
	ENUM_GET_CHAT_LIST			= 0;	// Getchatlist
	ENUM_CHAT_SPEAK				= 1;	// Translated comment.
	ENUM_UPDATA_SPEAK			= 2;	// Chat
};

enum ENUM_CHAT_CHANNEL
{
	ENUM_CHAT_CHANNEL_NULL	= 0;
	ENUM_CHAT_CHANNEL_ORDINARY		= 1;	// Translated comment.
	ENUM_CHAT_CHANNEL_CROSS_ORDINARY= 2;	// Cross-server.
	ENUM_CHAT_CHANNEL_NONE			= 3;	// Translated comment.
};

// [Request]chat
message PROBUFF_NET_CHAT//C2G2 [actor_chat]
{
	optional int32 mtype				= 1; // enumlogic_chat
	optional int32 mchannelid			= 2; // enumchat_channel
	optional string mcontent			= 3; // mtype == chat_speak
};

message chatitem
{
	optional int64 mroleid	= 1;
	optional string mrolename	= 2;
	optional string mcontent	= 3;
	optional int32 mutc		= 4;
};
	
// [Response]chat
message PROBUFF_NET_CHAT_RESPONSE//G2C [actor_robot]
{
	optional int32 mtype				= 1; // enumlogic_chat
	optional int32 mchannelid			= 2; // tab_chat.mid
	repeated chatitem mchatlist		= 3; // mtype == get_chat_list || mtype == updata_speck
	optional bool mstat				= 4; // mtype == chat_speak
};

// [Request]switchroute
message PROBUFF_NET_SWITCH_LINE//C2G [actor_role]
{
	optional int32 mline				= 1;
};

// [Response]switchroute
message PROBUFF_NET_SWITCH_LINE_RESPONSE//G2C [actor_robot]
{
	optional int32 mline				= 1;
	optional bool mstat				= 2;
};

// [Request]getmaillist
message PROBUFF_NET_MAIL_LIST//C2G2 [actor_mail]
{
};

// [Response]getmaillist
message PROBUFF_NET_MAIL_LIST_RESPONSE//G2C [actor_robot]
{
	map<int32, pbdb.mail> mmail			= 1; // key mail id
};

// [Request]readmail
message PROBUFF_NET_MAIL_READ//C2G2 [actor_mail]
{
	optional int64 mmailid				= 1;
};

// [Response]readmail
message PROBUFF_NET_MAIL_READ_RESPONSE//G2C [actor_robot]
{
	optional int64 mmailid				= 1;
	optional bool mstat				= 2;
};

// [Request]claimmailattachment
message PROBUFF_NET_MAIL_DRAW//C2G2 [actor_mail]
{
	optional int64 mmailid				= 1;
};

// [Response]claimmailattachment
message PROBUFF_NET_MAIL_DRAW_RESPONSE//G2C [actor_robot]
{
	optional int64 mmailid				= 1;
	optional bool mstat				= 2;
};

// [Request]claimmailattachment
message PROBUFF_NET_MAIL_DEL//C2G2 [actor_mail]
{
	optional int64 mmailid				= 1;
};

// [Response]claimmailattachment
message PROBUFF_NET_MAIL_DEL_RESPONSE//G2C [actor_robot]
{
	optional int64 mmailid				= 1;
	optional bool mstat				= 2;
};

enum ENUM_KCP
{
	KCP_NULL = 0;
	KCP_GATEWAY = 1;
	KCP_ROLE = 2;
};


// [Request]getconnectionkcp-session
message PROBUFF_NET_KCPSESSION//XXX [actor_gateway]
{
	optional int64	mserverid	= 1;		// Player kcpconnection server
	optional string muip		= 2;
	optional int32	muport		= 3;
	optional int32	mconv		= 4;
	optional int64  mactoridserver = 5;
	optional int64  mactoridclient = 6;
	optional ENUM_KCP m_kcpnum = 7;
};

// [Response]kcp-session
message PROBUFF_NET_KCPSESSION_RESPONSE//G2C [actor_robot]
{
	optional string mkcpsession	= 1;
	optional int64	mserverid	= 2;		// Player kcpconnection server
	optional ENUM_KCP m_kcpnum = 3;
	optional int64  mactoridserver = 4;
	optional int64  mactoridclient = 5;
};

// [Request]claimtaskreward
message PROBUFF_NET_TASK_RECEIVE_AWARD//C2G [actor_role]
{
	optional int32	mtaskid	= 1;		// Taskid
};

message drop_item
{
	optional int32	mitem	= 1;
	optional int32	mcount	= 2;
};

// [Response]claimtaskreward
message PROBUFF_NET_TASK_RECEIVE_AWARD_RESPONSE//G2C [actor_robot]
{
	optional int32	mtaskid			= 1;		// Taskid
	optional bool   mstat				= 2;		// Whetherclaimsuccessful
	map<int32,int32> mdrop				= 3;		// Reward key:itemid value:itemcount
};

// [Request]createguild
message PROBUFF_NET_FAMIL_CREATE//C2G2 [actor_family]
{
	optional string mname = 1;	// Createguild name
}

// [Response]createguild
message PROBUFF_NET_FAMIL_CREATE_RESPONSE//G2C [actor_robot]
{
	optional int32  mstat				= 1;		// State
}

// [Request]getguildinfo
message PROBUFF_NET_FAMIL_INFO//C2G2 [actor_family]
{
}

// [Response]createguild
message PROBUFF_NET_FAMIL_INFO_RESPONSE//G2C [actor_robot]
{
	optional int32  mstat					= 1;		// State
	optional pbdb.db_family	minfo			= 2;				
	repeated pbdb.db_brief mmember			= 3;
}

// [Request]apply/canceljoinguild
