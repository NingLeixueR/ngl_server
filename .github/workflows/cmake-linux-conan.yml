name: ubuntu-latest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.ljob }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - ljob: unity
          lunity: 'ON'
          ltest: 'ON'
        - ljob: no_unity
          lunity: 'OFF'
          ltest: 'OFF'
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python (required for Conan)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: .github/workflows/cmake-linux-conan.yml

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ${{ env.CONAN_HOME }}
        key: conan-${{ runner.os }}-gcc13-release-cpp20-${{ hashFiles('conanfile.py', '.github/workflows/cmake-linux-conan.yml') }}
        restore-keys: |
          conan-${{ runner.os }}-gcc13-release-cpp20-
          conan-${{ runner.os }}-

    - name: Install GCC 13
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13

    - name: Set GCC 13 as default
      run: |
        echo "CC=gcc-13" >> $GITHUB_ENV
        echo "CXX=g++-13" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y uuid-dev

    - name: Install latest CMake
      run: |
        pip install cmake --upgrade
        cmake --version

    - name: Install Conan(python -m pip install conan)
      run: |
        pip install conan
        conan --version

    - name: Create build directory
      run: mkdir -p build

    - name: Install dependencies with Conan(python -m conan)
      run: |
        conan profile detect --force
        conan install . -s build_type=Release -s compiler.cppstd=20 --build=missing

    - name: Configure with CMake
      run: cmake --preset conan-release -DNGL_ENABLE_NATIVE_UNITY_BUILD=${{ matrix.lunity }}

    - name: Build project
      run: cmake --build --preset conan-release

    - name: Run tests
      if: ${{ matrix.ltest == 'ON' }}
      run: ctest --preset conan-release --output-on-failure
