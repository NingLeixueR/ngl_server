name: manual-test

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Build workflow run id
        required: true
        type: string
      artifact_name:
        description: Build artifact to test
        required: true
        type: choice
        options:
          - linux-unity-release
          - linux-no_unity-release
          - windows-release

permissions:
  actions: read
  contents: read

jobs:
  test_linux:
    if: ${{ startsWith(inputs.artifact_name, 'linux-') }}
    runs-on: ubuntu-latest
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: .github/workflows/manual-test.yml

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ${{ env.CONAN_HOME }}
        key: conan-${{ runner.os }}-gcc13-release-cpp20-${{ hashFiles('conanfile.py', '.github/workflows/cmake-linux-conan.yml', '.github/workflows/manual-test.yml') }}
        restore-keys: |
          conan-${{ runner.os }}-gcc13-release-cpp20-
          conan-${{ runner.os }}-

    - name: Install GCC 13
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13

    - name: Set GCC 13 as default
      run: |
        echo "CC=gcc-13" >> $GITHUB_ENV
        echo "CXX=g++-13" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y uuid-dev

    - name: Install CMake and Conan
      run: |
        pip install cmake --upgrade
        pip install conan
        cmake --version
        conan --version

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ github.workspace }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.run_id }}

    - name: Prepare Conan environment
      run: |
        conan profile detect --force
        conan install . -s build_type=Release -s compiler.cppstd=20 --build=missing

    - name: Sync runtime config
      run: |
        cmake -E remove_directory "${{ github.workspace }}/bin/Release/config"
        cmake -E copy_directory "${{ github.workspace }}/bin/configure/config" "${{ github.workspace }}/bin/Release/config"

    - name: Run tests
      working-directory: ${{ github.workspace }}/bin/Release
      run: ctest --test-dir ../../build/Release --output-on-failure

  test_windows:
    if: ${{ inputs.artifact_name == 'windows-release' }}
    runs-on: windows-2022
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: .github/workflows/manual-test.yml

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ${{ env.CONAN_HOME }}
        key: conan-${{ runner.os }}-msvc143-release-cpp20-${{ hashFiles('conanfile.py', '.github/workflows/cmake-windows-conan.yml', '.github/workflows/manual-test.yml') }}
        restore-keys: |
          conan-${{ runner.os }}-msvc143-release-cpp20-
          conan-${{ runner.os }}-

    - name: Install Conan
      run: |
        pip install conan
        conan --version

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ github.workspace }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.run_id }}

    - name: Prepare Conan environment
      run: |
        conan profile detect --force
        conan install . -s build_type=Release -s compiler.cppstd=20 --build=missing

    - name: Run tests
      run: ctest --preset conan-release --output-on-failure
