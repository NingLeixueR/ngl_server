name: windows-build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
    env:
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python (required for Conan)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: .github/workflows/cmake-windows-conan.yml

    - name: Cache Conan packages
      uses: actions/cache@v4
      with:
        path: ${{ env.CONAN_HOME }}
        key: conan-${{ runner.os }}-msvc143-release-cpp20-${{ hashFiles('conanfile.py', '.github/workflows/cmake-windows-conan.yml') }}
        restore-keys: |
          conan-${{ runner.os }}-msvc143-release-cpp20-
          conan-${{ runner.os }}-

    - name: Install Conan(python -m pip install conan)
      run: |
        pip install conan
        conan --version

    - name: Create build directory
      run: mkdir build

    - name: Install dependencies with Conan(python -m conan)
      run: |
        conan profile detect --force
        conan install . -s build_type=Release -s compiler.cppstd=20 --build=missing

    - name: Configure with CMake
      run: cmake --preset conan-default

    - name: Build project
      run: cmake --build --preset conan-release

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: |
          bin/Release
          build/Release
          CMakeUserPresets.json
        if-no-files-found: error
        retention-days: 14
